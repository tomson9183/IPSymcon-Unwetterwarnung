<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        :root {
            --bg: #1b1d22;
            --card: rgba(255, 255, 255, 0.06);
            --text: #f2f3f5;
            --muted: #9aa0a8;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
        }
        #wrap { padding: 10px; }
        #header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 10px;
            padding: 12px 14px;
            color: #fff;
        }
        #icon { font-size: 28px; line-height: 1; }
        #headtext { flex: 1; }
        #level { font-size: 16px; font-weight: 700; }
        #sub { font-size: 12px; opacity: 0.9; }
        #count {
            font-size: 22px;
            font-weight: 800;
            min-width: 34px;
            text-align: center;
        }
        #list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .card {
            background: var(--card);
            border-left: 5px solid #888;
            border-radius: 8px;
            padding: 8px 10px;
        }
        .card .hl { font-weight: 600; font-size: 14px; }
        .card .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            margin-right: 6px;
        }
        #empty {
            text-align: center;
            padding: 22px 10px;
            color: #2ecc71;
            font-weight: 600;
        }
        #updated { text-align: right; font-size: 10px; color: var(--muted); margin-top: 8px; }
    </style>
</head>
<body>
    <div id="wrap">
        <div id="header">
            <div id="icon">🟢</div>
            <div id="headtext">
                <div id="level">–</div>
                <div id="sub"></div>
            </div>
            <div id="count">0</div>
        </div>
        <div id="list"></div>
        <div id="empty" style="display:none;">Keine Warnungen – alles ruhig.</div>
        <div id="updated"></div>
    </div>

    <script>
        var COLORS = { 0: '#2ecc71', 1: '#f1c40f', 2: '#e67e22', 3: '#e74c3c', 4: '#8e44ad' };
        var LEVEL_ICON = { 0: '🟢', 1: '🟡', 2: '🟠', 3: '🔴', 4: '🟣' };
        var CAT_ICON = { weather: '🌩️', civil: '⚠️', flood: '🌊', police: '🚓' };

        function render(data) {
            if (!data) { return; }
            if (typeof data === 'string') {
                try { data = JSON.parse(data); } catch (e) { return; }
            }
            var level = data.level || 0;
            var color = COLORS[level] || '#888';

            document.getElementById('header').style.background = color;
            document.getElementById('icon').textContent = LEVEL_ICON[level] || '⚠️';
            document.getElementById('level').textContent = data.levelText || '';
            document.getElementById('count').textContent = data.count || 0;
            document.getElementById('sub').textContent =
                (data.count > 0) ? (data.count + ' aktive Warnung(en)') : 'Keine aktiven Warnungen';

            var list = document.getElementById('list');
            list.innerHTML = '';
            var warnings = data.warnings || [];

            document.getElementById('empty').style.display = warnings.length ? 'none' : 'block';

            warnings.forEach(function (w) {
                var c = COLORS[w.severity] || '#888';
                var card = document.createElement('div');
                card.className = 'card';
                card.style.borderLeftColor = c;
                var badge = '<span class="badge" style="background:' + c + '">'
                    + (CAT_ICON[w.category] || '') + ' ' + (w.levelText || '') + '</span>';
                card.innerHTML = '<div class="hl">' + escapeHtml(w.headline) + '</div>'
                    + '<div class="meta">' + badge + escapeHtml(w.provider)
                    + (w.time ? ' · ' + escapeHtml(w.time) : '') + '</div>';
                list.appendChild(card);
            });

            document.getElementById('updated').textContent =
                data.updated ? ('Stand: ' + data.updated) : '';
        }

        function escapeHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Wird von IP-Symcon bei UpdateVisualizationValue() aufgerufen.
        function handleMessage(data) {
            render(data);
        }

        // Initialzustand (von GetVisualizationTile eingesetzt).
        render(/*INITIAL_DATA*/null);
    </script>
</body>
</html>
