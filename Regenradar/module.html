<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        html, body { margin:0; padding:0; overflow:hidden; background:#e9eff3;
            font-family:-apple-system,"Segoe UI",Roboto,sans-serif; }
        #wrap { position:relative; width:100%; line-height:0; }
        #base { width:100%; height:auto; display:block; }
        /* zwei Overlay-Ebenen fuer weiches Ueberblenden (Crossfade) */
        .ov { position:absolute; left:0; top:0; width:100%; height:auto; display:block; opacity:0;
            transition:opacity .30s linear; will-change:opacity; }
        #bar { position:absolute; left:0; right:0; top:0; z-index:6; display:flex; align-items:center; gap:8px;
            padding:6px 10px; line-height:1.2;
            background:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,0)); color:#fff; font-size:13px; pointer-events:none; }
        #bar .t { font-weight:800; } #bar .p { font-weight:600; opacity:.95; }
        #clock { margin-left:auto; font-weight:800; font-variant-numeric:tabular-nums;
            background:rgba(0,0,0,.5); padding:2px 8px; border-radius:8px; }
        #marker { position:absolute; left:50%; top:50%; width:14px; height:14px; transform:translate(-50%,-50%); z-index:5;
            border:3px solid #e74c3c; border-radius:50%; box-shadow:0 0 0 2px rgba(255,255,255,.85); pointer-events:none; }
        #legend { position:absolute; left:8px; bottom:46px; z-index:6; background:rgba(0,0,0,.5); color:#fff;
            border-radius:6px; padding:4px 7px; font-size:9px; line-height:1.6; pointer-events:none; }
        #legend i { display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:3px; vertical-align:-1px; }
        #play { position:absolute; left:50%; bottom:10px; transform:translateX(-50%); z-index:7;
            border:0; border-radius:22px; padding:8px 18px; font-size:14px; font-weight:800; cursor:pointer; line-height:1.2;
            color:#fff; background:linear-gradient(135deg,#2980b9,#4aa3ff); box-shadow:0 2px 8px rgba(0,0,0,.35); }
        #play:active { transform:translateX(-50%) scale(.96); }
        #hint { padding:30px 16px; text-align:center; color:#445; line-height:1.4; }
    </style>
</head>
<body>
    <div id="wrap">
        <img id="base" alt="">
        <img id="ovA" class="ov" alt="">
        <img id="ovB" class="ov" alt="">
        <div id="marker"></div>
        <div id="bar"><span class="t">🌧️ Regenvorschau</span><span class="p" id="place"></span><span id="clock"></span></div>
        <div id="legend">
            <span><i style="background:#88c0ff"></i>leicht</span>
            <span><i style="background:#1f9d2f"></i>mäßig</span>
            <span><i style="background:#ffd400"></i>stark</span>
            <span><i style="background:#e60000"></i>heftig</span>
        </div>
        <button id="play" onclick="onPlay()">▶ 60-Min-Vorschau</button>
    </div>
    <div id="hint" style="display:none;"></div>

    <script>
        var CFG = null, frames = [], pre = [], anim = null, stopT = null, playing = false, front = 'A', cur = 0;

        // Alle Overlay-Bilder vorladen -> sofortiges, flüssiges Umschalten.
        function preload() {
            pre = frames.map(function (f) { var im = new Image(); im.src = f.ov; return im; });
        }

        // Zeigt Frame i; mit sanftem Überblenden (Crossfade) zwischen den beiden Ebenen.
        function showFrame(i, fade) {
            if (!frames.length) { return; }
            i = (i + frames.length) % frames.length;
            cur = i;
            var a = document.getElementById('ovA'), b = document.getElementById('ovB');
            var show = (front === 'A') ? b : a;   // auf der versteckten Ebene laden
            var hide = (front === 'A') ? a : b;
            show.src = frames[i].ov;
            if (!fade) { show.style.transition = 'none'; }
            show.style.opacity = '1';
            hide.style.opacity = '0';
            if (!fade) { void show.offsetWidth; show.style.transition = ''; }
            front = (front === 'A') ? 'B' : 'A';
            document.getElementById('clock').textContent = frames[i].label || '';
        }

        function play() {
            if (frames.length < 2) { return; }
            if (anim) { clearInterval(anim); }
            if (stopT) { clearTimeout(stopT); }
            playing = true;
            document.getElementById('play').textContent = '⏸ Vorschau läuft …';
            var i = 0;
            showFrame(0, true);
            anim = setInterval(function () {
                i = (i + 1) % frames.length;
                showFrame(i, true);
            }, 420);
            var dur = (CFG && CFG.play ? CFG.play : 30) * 1000;
            stopT = setTimeout(stop, dur);
        }

        function stop() {
            if (anim) { clearInterval(anim); anim = null; }
            if (stopT) { clearTimeout(stopT); stopT = null; }
            playing = false;
            document.getElementById('play').textContent = '▶ 60-Min-Vorschau';
            showFrame(0, true); // "jetzt"
        }

        function onPlay() {
            if (playing) { stop(); return; }
            if (frames.length > 1) { play(); }
            if (typeof requestAction === 'function') {
                document.getElementById('clock').textContent = 'lädt …';
                requestAction('Play', true);
            }
        }

        function render(data) {
            if (typeof data === 'string') { try { data = JSON.parse(data); } catch (e) { return; } }
            if (!data) { return; }
            CFG = data;
            frames = data.frames || [];
            document.getElementById('place').textContent = data.place || '';

            var ok = data.configured && data.base && frames.length > 0;
            document.getElementById('wrap').style.display = ok ? 'block' : 'none';
            var hint = document.getElementById('hint');
            hint.style.display = ok ? 'none' : 'block';
            hint.textContent = data.configured
                ? 'Vorschau wird gebaut … Falls dauerhaft leer: Konfiguration öffnen und „Karte jetzt bauen / testen“ drücken.'
                : 'Bitte in der Konfiguration eine Gemeinde wählen.';

            if (ok) {
                document.getElementById('base').src = data.base;
                preload();
                document.getElementById('play').style.display = (frames.length > 1) ? 'block' : 'none';
                if (data.autoplay) { play(); } else { stop(); }
            }
        }

        function handleMessage(data) { render(data); }
        window.addEventListener('load', function () { render(/*INITIAL_DATA*/null); });
    </script>
</body>
</html>
